{% extends 'base.html' %}

{% block title %}Edit Category -Abbas X Patwari Ghorom Khobor{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-pencil"></i> Edit Category</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_name" class="form-label">Name *</label>
                            {{ form.name }}
                        </div>

                        <div class="mb-3">
                            <label for="id_slug" class="form-label">Slug *</label>
                            {{ form.slug }}
                        </div>

                        <div class="mb-3">
                            <label for="id_description" class="form-label">Description</label>
                            {{ form.description }}
                        </div>

                        <div class="mb-3">
                            <label for="id_order" class="form-label">Display Order</label>
                            {{ form.order }}
                        </div>

                        <div class="mb-4 form-check">
                            {{ form.is_active }}
                            <label class="form-check-label" for="id_is_active">Active</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'articles:category_manage' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Update Category
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
